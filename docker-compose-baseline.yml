# =====================================================
# docker-compose-baseline.yml
# FP-TKA-B01 — Baseline Config: 1 VM, No Load Balancer
# VM: DigitalOcean Droplet — 4 vCPU, 8 GB RAM, 160 GB
# Harga: $48/bulan
# =====================================================
#
# Topologi:
#   Internet → Nginx (port 80) → Flask/Gunicorn (port 5000) → MongoDB (port 27017)
#
# Services:
#   - nginx    : Reverse proxy + serve frontend statis
#   - backend  : Flask app (Gunicorn, 8 workers x 2 threads)
#   - mongo    : MongoDB 7.0 (database)
#
# Cara pakai:
#   cp .env .env          # pastikan .env sudah ada
#   docker compose -f docker-compose-baseline.yml up -d
#   docker compose -f docker-compose-baseline.yml logs -f
# =====================================================

version: "3.9"

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local

services:

  mongo:
    image: mongo:7.0
    container_name: fp_mongo_baseline
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      ${MONGO_INITDB_DATABASE}

    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      # Auto-seed: script dijalankan otomatis saat volume mongo_data pertama kali dibuat
      - ./Resources/DB/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
      - ./Resources/DB/dump/orderdb:/docker-seed:ro

    networks:
      - app_net


    #   - "27017:27017"   # uncomment jika perlu akses eksternal untuk debugging

    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 512M

    command: >
      mongod
      --wiredTigerCacheSizeGB 2
      --quiet

  backend:
    build:
      context: ./Resources/BE
      dockerfile: Dockerfile
    image: fp_backend_baseline:latest
    container_name: fp_backend_baseline

    restart: unless-stopped

    env_file:
      - .env

    environment:
      MONGO_URI:             ${MONGO_URI}
      JWT_SECRET:            ${JWT_SECRET}
      JWT_EXPIRES:           ${JWT_EXPIRES}
      PORT:                  5000
      GUNICORN_WORKERS:      ${GUNICORN_WORKERS:-8}
      GUNICORN_THREADS:      ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT:      ${GUNICORN_TIMEOUT:-120}
      GUNICORN_WORKER_CLASS: ${GUNICORN_WORKER_CLASS:-gthread}

    depends_on:
      mongo:
        condition: service_healthy

    networks:
      - app_net

    # ports:
    #   - "5000:5000"   # uncomment untuk debug langsung

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 20s

    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 256M


  nginx:
    image: nginx:1.25-alpine
    container_name: fp_nginx_baseline
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Resources/FE:/usr/share/nginx/html:ro

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - app_net

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
