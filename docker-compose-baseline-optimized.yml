l# =====================================================
# docker-compose-baseline-optimized.yml
# FP-TKA-B01 — Optimized Config: 1 VM + Internal LB
# VM: DigitalOcean Droplet — 4 vCPU, 8 GB RAM, 160 GB
# Harga: $48/bulan (VM sama dengan baseline)
# =====================================================
#
# Optimasi yang diterapkan vs baseline:
#   1. Load Balancer  : Nginx least_conn → 2 backend instance
#   2. gevent workers : Async I/O (gantikan gthread)
#   3. MongoDB Index  : Index pada semua field query utama
#   4. Connection Pool: maxPoolSize=20, timeout tuning
#   5. Nginx Cache    : /products cache 30s, /products/<id> 60s
#   6. Async audit log: write_log() tidak block HTTP response
#
# Topologi:
#   Internet → Nginx (port 80) [LB + Cache]
#             ├─▶ backend_1:5000 (gevent, 3 workers)
#             └─▶ backend_2:5000 (gevent, 3 workers)
#                 └─▶ MongoDB (port 27017)
#
# Cara pakai:
#   docker compose -f docker-compose-baseline-optimized.yml up -d --build
#   docker compose -f docker-compose-baseline-optimized.yml logs -f
# =====================================================

version: "3.9"

networks:
  app_net_opt:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

volumes:
  mongo_data_opt:
    driver: local
  mongo_config_opt:
    driver: local
  nginx_cache:
    driver: local

services:

  # ──────────────────────────────────────────────────
  # MongoDB — dengan index creation otomatis
  # ──────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: fp_mongo_optimized
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE:      ${MONGO_INITDB_DATABASE}

    volumes:
      - mongo_data_opt:/data/db
      - mongo_config_opt:/data/configdb
      # 01: seed data dulu, 02: baru buat index
      - ./Resources/DB/init-mongo.sh:/docker-entrypoint-initdb.d/01-init-mongo.sh:ro
      - ./Resources/DB/dump/orderdb:/docker-seed:ro
      - ./Resources/DB/init-indexes.js:/docker-entrypoint-initdb.d/02-init-indexes.js:ro

    networks:
      - app_net_opt

    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 512M

    command: >
      mongod
      --wiredTigerCacheSizeGB 2
      --quiet

  # ──────────────────────────────────────────────────
  # Backend Instance 1 — gevent + connection pool
  # ──────────────────────────────────────────────────
  backend_1:
    build:
      context: ./Resources/BE
      dockerfile: Dockerfile-optimized
    image: fp_backend_optimized:latest
    container_name: fp_backend_1_optimized
    restart: unless-stopped

    env_file:
      - .env

    environment:
      MONGO_URI:                   ${MONGO_URI}
      JWT_SECRET:                  ${JWT_SECRET}
      JWT_EXPIRES:                 ${JWT_EXPIRES}
      PORT:                        5000
      GUNICORN_WORKERS:            ${GUNICORN_WORKERS_OPT:-3}
      GUNICORN_WORKER_CLASS:       gevent
      GUNICORN_WORKER_CONNECTIONS: 1000
      GUNICORN_TIMEOUT:            ${GUNICORN_TIMEOUT:-120}
      INSTANCE_ID:                 backend_1

    depends_on:
      mongo:
        condition: service_healthy

    networks:
      - app_net_opt

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 20s

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M

  # ──────────────────────────────────────────────────
  # Backend Instance 2 — gevent + connection pool
  # ──────────────────────────────────────────────────
  backend_2:
    build:
      context: ./Resources/BE
      dockerfile: Dockerfile-optimized
    image: fp_backend_optimized:latest
    container_name: fp_backend_2_optimized
    restart: unless-stopped

    env_file:
      - .env

    environment:
      MONGO_URI:                   ${MONGO_URI}
      JWT_SECRET:                  ${JWT_SECRET}
      JWT_EXPIRES:                 ${JWT_EXPIRES}
      PORT:                        5000
      GUNICORN_WORKERS:            ${GUNICORN_WORKERS_OPT:-3}
      GUNICORN_WORKER_CLASS:       gevent
      GUNICORN_WORKER_CONNECTIONS: 1000
      GUNICORN_TIMEOUT:            ${GUNICORN_TIMEOUT:-120}
      INSTANCE_ID:                 backend_2

    depends_on:
      mongo:
        condition: service_healthy

    networks:
      - app_net_opt

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 20s

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M

  # ──────────────────────────────────────────────────
  # Nginx — Load Balancer + Reverse Proxy + Cache
  # ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fp_nginx_optimized
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx-optimized.conf:/etc/nginx/nginx.conf:ro
      - ./Resources/FE:/usr/share/nginx/html:ro
      - nginx_cache:/tmp/nginx_cache

    depends_on:
      backend_1:
        condition: service_healthy
      backend_2:
        condition: service_healthy

    networks:
      - app_net_opt

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
