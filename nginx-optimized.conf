user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;      # Baseline: 1024 — 4x lebih banyak
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging (dengan cache status) ────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time cache=$upstream_cache_status';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  2000;      # Baseline: 1000
    types_hash_max_size 2048;

    # ── Gzip Compression ──────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript;

    # ── Proxy Cache ────────────────────────────────────────────
    # Optimasi: Cache response GET /products dan /products/<id>
    # Di-store di Docker volume nginx_cache (tmpfs-like)
    proxy_cache_path  /tmp/nginx_cache
                      levels=1:2
                      keys_zone=api_cache:20m
                      max_size=256m
                      inactive=120s
                      use_temp_path=off;

    # ── Buffer & Timeout tuning ───────────────────────────────
    client_body_buffer_size     16k;
    client_max_body_size        10m;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    proxy_connect_timeout  60s;
    proxy_send_timeout     60s;
    proxy_read_timeout     120s;
    proxy_buffering        on;
    proxy_buffer_size      8k;     # Baseline: 4k
    proxy_buffers          16 8k;  # Baseline: 8 4k

    # ── Upstream Load Balancer ─────────────────────────────────
    # Optimasi: 2 backend instance dengan least_conn LB
    # Baseline: 1 server, no load balancing
    upstream flask_backend {
        least_conn;                                        # kirim ke server paling idle
        server backend_1:5000 max_fails=3 fail_timeout=30s;
        server backend_2:5000 max_fails=3 fail_timeout=30s;
        keepalive 64;                                      # Baseline: 32
    }

    server {
        listen       80;
        server_name  _;

        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;

        location /nginx-health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }

        # ── Static frontend files ──────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ @backend;
        }

        # ── CACHED: GET /products (listing dengan filter/sort) ─
        # TTL: 30 detik — data produk jarang berubah dalam window ini
        # Cache key: method + full URI (termasuk query string)
        # X-Cache-Status header: HIT / MISS / BYPASS / EXPIRED
        location ~* ^/products$ {
            proxy_cache             api_cache;
            proxy_cache_valid       200 30s;
            proxy_cache_key         "$request_method$host$request_uri";
            proxy_cache_use_stale   error timeout updating http_500 http_502 http_503;
            proxy_cache_lock        on;
            proxy_cache_lock_timeout 5s;
            proxy_cache_min_uses    1;
            add_header              X-Cache-Status $upstream_cache_status always;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── CACHED: GET /products/<id> (detail produk) ─────────
        # TTL: 60 detik — detail produk sangat jarang berubah
        location ~* ^/products/[^/]+$ {
            proxy_cache             api_cache;
            proxy_cache_valid       200 60s;
            proxy_cache_key         "$request_method$host$request_uri";
            proxy_cache_use_stale   error timeout updating;
            proxy_cache_lock        on;
            proxy_cache_lock_timeout 5s;
            add_header              X-Cache-Status $upstream_cache_status always;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── NOT CACHED: semua endpoint lain (auth, orders, admin)
        location @backend {
            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     120s;
        }
    }
}
