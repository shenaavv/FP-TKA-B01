# =====================================================
# docker-compose-multivm-vm1.yml
# VM-1: Nginx Load Balancer + Backend-1 (Flask/Gunicorn)
# Spec: 2 vCPU, 4 GB RAM — $24/mo
# =====================================================
#
# DEPLOY KETIGA (setelah VM3 MongoDB + VM2 Backend-2 running)
#
# Cara pakai:
#   git clone ... && cd FP-TKA-B01
#   cp .env.example .env && nano .env
#   # Pastikan .env berisi:
#   #   MONGO_URI=mongodb://...@<VM3_PRIVATE_IP>:27017/...
#   #   VM2_PRIVATE_IP=10.xxx.xxx.xxx
#   docker compose -f docker-compose-multivm-vm1.yml up -d --build
# =====================================================

version: "3.9"

networks:
  app_net_vm1:
    driver: bridge

volumes:
  nginx_cache_multivm:
    driver: local

services:

  # ──────────────────────────────────────────────────
  # Backend-1 — Flask/Gunicorn (lokal di VM1)
  # ──────────────────────────────────────────────────
  backend_1:
    build:
      context: ./Resources/BE
      dockerfile: Dockerfile-optimized
    image: fp_backend_multivm:latest
    container_name: fp_backend_1_multivm
    restart: unless-stopped

    env_file:
      - .env

    environment:
      MONGO_URI:             ${MONGO_URI}       # point ke VM3_PRIVATE_IP
      JWT_SECRET:            ${JWT_SECRET}
      JWT_EXPIRES:           ${JWT_EXPIRES}
      PORT:                  5000
      GUNICORN_WORKERS:      ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS:      ${GUNICORN_THREADS:-4}
      GUNICORN_WORKER_CLASS: gthread
      GUNICORN_TIMEOUT:      ${GUNICORN_TIMEOUT:-120}
      INSTANCE_ID:           backend_1

    # Tidak expose ke publik — Nginx akses via Docker network (backend_1:5000)
    # ports: tidak diperlukan karena nginx dan backend_1 di jaringan Docker yang sama

    networks:
      - app_net_vm1

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 25s

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M

  # ──────────────────────────────────────────────────
  # Nginx — Load Balancer + Reverse Proxy + Cache
  # Mendistribusikan traffic ke backend_1 (local) dan
  # backend_2 (VM2, via DigitalOcean VPC private network)
  # ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fp_nginx_multivm
    restart: unless-stopped

    ports:
      - "80:80"

    environment:
      # Private IP VM2 — disubstitusi ke nginx.conf saat container start
      VM2_PRIVATE_IP: ${VM2_PRIVATE_IP}

    volumes:
      - ./nginx-multivm.conf:/etc/nginx/nginx.conf.template:ro
      - ./Resources/FE:/usr/share/nginx/html:ro
      - nginx_cache_multivm:/tmp/nginx_cache

    # envsubst: substitusi ${VM2_PRIVATE_IP} di template → nginx.conf final
    # Hanya substitusi VM2_PRIVATE_IP, biarkan variabel nginx ($host, $uri, dll) tetap
    command: >
      /bin/sh -c "
      envsubst '$${VM2_PRIVATE_IP}' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf &&
      nginx -g 'daemon off;'
      "

    depends_on:
      backend_1:
        condition: service_healthy

    networks:
      - app_net_vm1

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
