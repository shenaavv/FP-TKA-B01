# Nginx config TEMPLATE untuk Multi-VM setup
# =====================================================
# PENTING: File ini adalah TEMPLATE.
# Variabel ${VM2_PRIVATE_IP} akan disubstitusi otomatis
# oleh envsubst saat container nginx startup.
#
# Set di .env pada VM1:
#   VM2_PRIVATE_IP=10.xxx.xxx.xxx   (private IP VM2 dari DigitalOcean VPC)
# =====================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # в”Ђв”Ђ Logging в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time cache=$upstream_cache_status';

    access_log  /var/log/nginx/access.log  main;

    # в”Ђв”Ђ Performance в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  2000;
    types_hash_max_size 2048;

    # в”Ђв”Ђ Gzip Compression в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript;

    # в”Ђв”Ђ Proxy Cache в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    proxy_cache_path  /tmp/nginx_cache
                      levels=1:2
                      keys_zone=api_cache:20m
                      max_size=256m
                      inactive=120s
                      use_temp_path=off;

    # в”Ђв”Ђ Buffer Tuning в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    client_body_buffer_size     16k;
    client_max_body_size        10m;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    proxy_connect_timeout  10s;
    proxy_send_timeout     30s;
    proxy_read_timeout     30s;
    proxy_buffering        on;
    proxy_buffer_size      8k;
    proxy_buffers          16 8k;

    # Jika backend gagal, coba backend lain (failover otomatis)
    proxy_next_upstream error timeout http_502 http_503;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 10s;

    # TCP keepalive untuk koneksi ke upstream
    proxy_socket_keepalive on;

    # в”Ђв”Ђ Upstream Load Balancer в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # backend_1: lokal di VM1 (127.0.0.1)
    # backend_2: VM2 via DigitalOcean VPC (private IP)
    # ${VM2_PRIVATE_IP} disubstitusi envsubst saat container start
    upstream flask_backend {
        least_conn;
        server backend_1:5000         max_fails=5 fail_timeout=15s;  # VM1 (Docker service name)
        server ${VM2_PRIVATE_IP}:5000 max_fails=5 fail_timeout=15s;  # VM2 via VPC
        keepalive 128;
    }

    server {
        listen       80;
        server_name  _;

        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;

        location /nginx-health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }

        # в”Ђв”Ђ Static frontend files в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ @backend;
        }

        # в”Ђв”Ђ CACHED: GET /products (listing) вЂ” 30s TTL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        location ~* ^/products$ {
            proxy_cache             api_cache;
            proxy_cache_valid       200 30s;
            proxy_cache_key         "$request_method$host$request_uri";
            proxy_cache_use_stale   error timeout updating http_500 http_502 http_503;
            proxy_cache_lock        on;
            proxy_cache_lock_timeout 5s;
            add_header              X-Cache-Status $upstream_cache_status always;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # в”Ђв”Ђ CACHED: GET /products/<id> вЂ” 60s TTL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        location ~* ^/products/[^/]+$ {
            proxy_cache             api_cache;
            proxy_cache_valid       200 60s;
            proxy_cache_key         "$request_method$host$request_uri";
            proxy_cache_use_stale   error timeout updating;
            proxy_cache_lock        on;
            add_header              X-Cache-Status $upstream_cache_status always;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # в”Ђв”Ђ CACHED: GET /admin/stats вЂ” 15s TTL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        # KRITIS: endpoint ini butuh 22 detik per request
        # Cache 15s в†’ dari 66 thread blocked menjadi 1 thread per 15s
        location = /admin/stats {
            proxy_cache             api_cache;
            proxy_cache_valid       200 15s;
            proxy_cache_key         "$request_method$host$request_uri";
            proxy_cache_use_stale   error timeout updating;
            proxy_cache_lock        on;
            proxy_cache_lock_timeout 20s;
            add_header              X-Cache-Status $upstream_cache_status always;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # в”Ђв”Ђ CACHED: GET /admin/logs вЂ” 10s TTL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        # Audit logs jarang berubah dalam window 10 detik
        location ~* ^/admin/logs {
            proxy_cache             api_cache;
            proxy_cache_valid       200 10s;
            proxy_cache_key         "$request_method$host$request_uri";
            proxy_cache_use_stale   error timeout updating;
            proxy_cache_lock        on;
            add_header              X-Cache-Status $upstream_cache_status always;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # в”Ђв”Ђ CACHED: GET /admin/users вЂ” 10s TTL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        location ~* ^/admin/users {
            proxy_cache             api_cache;
            proxy_cache_valid       200 10s;
            proxy_cache_key         "$request_method$host$request_uri";
            proxy_cache_use_stale   error timeout updating;
            proxy_cache_lock        on;
            add_header              X-Cache-Status $upstream_cache_status always;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # в”Ђв”Ђ CACHED: GET /orders вЂ” 5s TTL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        # Hanya GET yang di-cache (POST /orders tetap langsung ke backend)
        # Cache key include query string (status, city, page, limit)
        location ~* ^/orders$ {
            proxy_cache             api_cache;
            proxy_cache_valid       200 5s;
            proxy_cache_key         "$request_method$host$request_uri";
            proxy_cache_use_stale   error timeout updating;
            proxy_cache_lock        on;
            add_header              X-Cache-Status $upstream_cache_status always;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # в”Ђв”Ђ NOT CACHED: auth, POST orders, status updates в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
        location @backend {
            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
        }
    }
}
