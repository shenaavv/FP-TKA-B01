# Nginx config TEMPLATE untuk Multi-VM setup
# =====================================================
# PENTING: File ini adalah TEMPLATE.
# Variabel ${VM2_PRIVATE_IP} akan disubstitusi otomatis
# oleh envsubst saat container nginx startup.
#
# Set di .env pada VM1:
#   VM2_PRIVATE_IP=10.xxx.xxx.xxx   (private IP VM2 dari DigitalOcean VPC)
# =====================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time cache=$upstream_cache_status';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  2000;
    types_hash_max_size 2048;

    # ── Gzip Compression ──────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript;

    # ── Proxy Cache ─────────────────────────────────────────────
    proxy_cache_path  /tmp/nginx_cache
                      levels=1:2
                      keys_zone=api_cache:20m
                      max_size=256m
                      inactive=120s
                      use_temp_path=off;

    # ── Buffer Tuning ────────────────────────────────────────────
    client_body_buffer_size     16k;
    client_max_body_size        10m;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    proxy_connect_timeout  60s;
    proxy_send_timeout     60s;
    proxy_read_timeout     120s;
    proxy_buffering        on;
    proxy_buffer_size      8k;
    proxy_buffers          16 8k;

    # ── Upstream Load Balancer ─────────────────────────────────────
    # backend_1: lokal di VM1 (127.0.0.1)
    # backend_2: VM2 via DigitalOcean VPC (private IP)
    # ${VM2_PRIVATE_IP} disubstitusi envsubst saat container start
    upstream flask_backend {
        least_conn;
        server 127.0.0.1:5000          max_fails=3 fail_timeout=30s;  # VM1 local
        server ${VM2_PRIVATE_IP}:5000  max_fails=3 fail_timeout=30s;  # VM2 via VPC
        keepalive 64;
    }

    server {
        listen       80;
        server_name  _;

        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;

        location /nginx-health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }

        # ── Static frontend files ──────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ @backend;
        }

        # ── CACHED: GET /products (listing) — 30s TTL ──────────
        location ~* ^/products$ {
            proxy_cache             api_cache;
            proxy_cache_valid       200 30s;
            proxy_cache_key         "$request_method$host$request_uri";
            proxy_cache_use_stale   error timeout updating http_500 http_502 http_503;
            proxy_cache_lock        on;
            proxy_cache_lock_timeout 5s;
            add_header              X-Cache-Status $upstream_cache_status always;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── CACHED: GET /products/<id> — 60s TTL ───────────────
        location ~* ^/products/[^/]+$ {
            proxy_cache             api_cache;
            proxy_cache_valid       200 60s;
            proxy_cache_key         "$request_method$host$request_uri";
            proxy_cache_use_stale   error timeout updating;
            proxy_cache_lock        on;
            add_header              X-Cache-Status $upstream_cache_status always;

            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── NOT CACHED: auth, orders, admin ────────────────────
        location @backend {
            proxy_pass         http://flask_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     120s;
        }
    }
}
